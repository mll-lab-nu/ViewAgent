# ── Random Baseline: Forward & View2Path ─────────────────────
# Randomly picks one of A/B/C/D for each question.
# ─────────────────────────────────────────────────────────────────────

fileroot: ${oc.env:VIEWSUITE_ROOT}

envs:

  - name: Path2View
    n_envs: 530
    tag_id: path_to_view
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/path_to_view_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0
    chat_config:
      file_path: forward_inverse.json

  - name: View2Path
    n_envs: 530
    tag_id: view_to_path
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/view_to_path_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0
    chat_config:
      file_path: forward_inverse.json

default_chat_config:
  random_seed: 42

experiment:
  dump_dir: ${fileroot}/rollouts/random_response
  default_max_turns: 1

run:
  backend: "random_response"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  random_response:
    model: "random"
    max_concurrency: 100
    max_retries: 0
