defaults:
  - ../eval_default

fileroot: ${oc.env:VIEWSUITE_ROOT}

envs:
  - name: InteractiveViewPlanning
    n_envs: 545
    tag_id: 21
    seed: [0,545,1]
    split: test
    max_turns: 20
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/interactive_view_planning_test.jsonl
      max_turns: 20
      render_backend: client
      client_url_file_path: ${fileroot}/client_url.txt
      format: eval_mode
      image_size: [512,512]
    chat_config:
      generation_config:
        temperature: 0.0
        top_p: 0.95
        top_k: 64
        candidate_count: 1
        max_output_tokens: 32768
      safety_settings: []

  - name: InteractiveViewPlanning
    n_envs: 545
    tag_id: 22
    seed: [0,545,1]
    split: test
    max_turns: 30
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/interactive_view_planning_test.jsonl
      max_turns: 30
      render_backend: client
      client_url_file_path: ${fileroot}/client_url.txt
      format: eval_mode
      image_size: [512,512]
    chat_config:
      generation_config:
        temperature: 0.0
        top_p: 0.95
        top_k: 64
        candidate_count: 1
        max_output_tokens: 32768
      safety_settings: []

experiment:
  dump_dir: ${fileroot}/rollouts/gemini_25_pro
  default_max_turns: 1

run:
  backend: "gemini"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  gemini:
    api_key: ""               # or export GEMINI_API_KEY
    model: "gemini-2.5-pro"
    max_concurrency: 24
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
