defaults:
  - ../eval_default

fileroot: ${oc.env:VIEWSUITE_ROOT}

default_chat_config:
  temperature: 0.0
  max_tokens: 2048
  top_p: 0.95

# InteractiveViewPlanning with no_submit=true:
# Episode auto-succeeds when current pose is within threshold of target;
# no answer/submit action is required from the agent.
envs:
  - name: InteractiveViewPlanning
    n_envs: 530
    tag_id: interactive_view_planning
    seed: [1, 530, 1]
    split: test
    max_turns: 10
    config:
      no_submit: true
      jsonl_path: ${fileroot}/data/viewsuite_15k/interactive_view_planning_test_filter.jsonl
      max_turns: 10
      render_backend: client
      client_url_file_path: ${fileroot}/client_url.txt
      image_size: [512, 512]
      format: eval_mode
      use_example_in_sys_prompt: false
      action_only_mode: true

experiment:
  dump_dir: ${fileroot}/rollouts_iter003_nosubmit/qwen_25_vl_7b
  default_max_turns: 10

run:
  backend: "sglang"
  base_seed: 0
  max_concurrent_jobs: 64
  resume: skip_completed
  live_summary: true

backends:
  sglang:
    base_url: "http://127.0.0.1:30000/v1"
    api_key: "EMPTY"
    model: "Qwen/Qwen2.5-VL-7B-Instruct"
    max_concurrency: 32
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
