fileroot: ${oc.env:VIEWSUITE_ROOT}

default_chat_config: &chat_config
  temperature: 0.0
  max_tokens: 2048
  top_p: 0.95
  extra_body:
    reasoning:
      enabled: false

envs:

  - name: Path2View
    n_envs: 530
    tag_id: path_to_view
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/path_to_view_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0
    chat_config: *chat_config

  - name: View2Path
    n_envs: 530
    tag_id: view_to_path
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/view_to_path_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0
    chat_config: *chat_config

  - name: InteractiveViewPlanning
    n_envs: 530
    tag_id: interactive_view_planning
    seed: [1,530,1]
    split: test
    max_turns: 10
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/interactive_view_planning_test_filter.jsonl
      max_turns: 10
      render_backend: client
      client_url_file_path: ${fileroot}/client_url.txt
      image_size: [512,512]
      format: eval_mode
      use_example_in_sys_prompt: false
      action_only_mode: true
    chat_config: *chat_config


experiment:
  dump_dir: ${fileroot}/rollouts/kimi_k2_5
  default_max_turns: 1

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ${oc.env:OPENROUTER_API_KEY}
    base_url: "https://openrouter.ai/api/v1"
    model: "moonshotai/kimi-k2.5"
    max_concurrency: 24
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
