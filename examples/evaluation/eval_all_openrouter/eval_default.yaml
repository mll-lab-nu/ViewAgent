# ── ViewSuite Proxy Task Default Config ──────────────────────────────
# Base config for evaluating models via OpenRouter proxy.
#
# Usage: create a per-model config that inherits from this file:
#
#   defaults:
#     - eval_default
#
#   default_chat_config:           # override chat params if needed
#     temperature: 0.0
#     max_tokens: 10000
#     extra_body:
#       reasoning:
#         effort: "medium"
#
#   experiment:
#     dump_dir: ${fileroot}/rollouts/my_model
#
#   backends:
#     openai:
#       model: "openai/gpt-5.4-pro"
#
# Only override the fields you need to change.
# ─────────────────────────────────────────────────────────────────────

fileroot: ${oc.env:VIEWSUITE_ROOT}

default_chat_config:
  temperature: 0.0
  max_tokens: 10000
  top_p: 0.95

envs:

  - name: Path2View
    n_envs: 530
    tag_id: path_to_view
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/path_to_view_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0

  - name: View2Path
    n_envs: 530
    tag_id: view_to_path
    seed: [1,530,1]
    split: test
    max_turns: 1
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/view_to_path_test_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      example_count: 0

  - name: InteractiveViewPlanning
    n_envs: 530
    tag_id: interactive_view_planning
    seed: [1,530,1]
    split: test
    max_turns: 10
    config:
      jsonl_path: ${fileroot}/data/viewsuite_15k/interactive_view_planning_test_filter.jsonl
      max_turns: 10
      render_backend: client
      client_url_file_path: ${fileroot}/client_url.txt
      image_size: [512,512]
      format: eval_mode
      use_example_in_sys_prompt: false
      action_only_mode: true

experiment:
  dump_dir: ${fileroot}/rollouts/default
  default_max_turns: 1

run:
  backend: "openai"
  base_seed: 0
  max_concurrent_jobs: 24
  resume: skip_completed
  live_summary: true

backends:
  openai:
    api_key: ${oc.env:OPENROUTER_API_KEY}  # export OPENROUTER_API_KEY
    base_url: "https://openrouter.ai/api/v1"
    model: "openai/gpt-4o"
    max_concurrency: 24
    max_retries: 6
    min_backoff: 0.5
    max_backoff: 8.0
