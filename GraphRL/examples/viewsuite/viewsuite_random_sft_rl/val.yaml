envs:
  - name: InteractiveViewPlanning
    data_source: ae
    seed: [0, 378, 1]
    n_envs: 100
    max_turns: 10
    response_length_per_turn: 512
    config:
      jsonl_path: ${oc.env:VIEWSUITE_ROOT}/data/viewsuite_15k/interactive_view_planning_dev_filter.jsonl
      image_size: [512, 512]
      format: eval_mode
      use_example_in_sys_prompt: false
      client_url_file_path: ${oc.env:VIEWSUITE_ROOT}/client_url.txt
      render_backend: client
      max_turns: 10
      action_only_mode: true

  - name: Path2View
    data_source: path_to_view
    seed: [0, 378, 1]
    n_envs: 378
    max_turns: 1
    response_length_per_turn: 2048
    config:
      jsonl_path: ${oc.env:VIEWSUITE_ROOT}/data/viewsuite_15k/path_to_view_dev_filter.jsonl
      image_size: [512, 512]
      format: eval_mode
      format_reward: 0.0
      answer_reward: 0.1

  - name: View2Path
    data_source: view_to_path
    seed: [0, 378, 1]
    n_envs: 378
    max_turns: 1
    response_length_per_turn: 2048
    config:
      jsonl_path: ${oc.env:VIEWSUITE_ROOT}/data/viewsuite_15k/view_to_path_dev_filter.jsonl
      image_size: [512, 512]
      format: eval_mode
      format_reward: 0.0
      answer_reward: 0.1
