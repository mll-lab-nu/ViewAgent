envs:
  - name: Path2View
    data_source: path_to_view
    seed: [0,3419,1]
    n_envs: 3419
    max_turns: 1
    response_length_per_turn: 2048 
    config:
      jsonl_path: ${oc.env:VIEWSUITE_ROOT}/data/viewsuite_15k/path_to_view_train_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      format_reward: 0.1
      answer_reward: 0.9
      
  - name: View2Path
    n_envs: 3419 
    data_source: view_to_path 
    seed: [0,3419,1]
    max_turns: 1
    response_length_per_turn: 2048 
    config:
      jsonl_path: ${oc.env:VIEWSUITE_ROOT}/data/viewsuite_15k/view_to_path_train_filter.jsonl
      image_size: [512,512]
      format: eval_mode
      format_reward: 0.1
      answer_reward: 0.9

      
